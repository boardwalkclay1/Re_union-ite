<!DOCTYPE html>
<html lang="en" class="theme-blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • Our Family Reunion</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/auth.css">
  <script defer src="js/theme.js"></script>
  <script defer src="js/api.js"></script>
</head>

<body>

<header class="auth-header">
  <a href="index.html" class="logo">Our Family Reunion</a>
  <div class="theme-toggle">
    <button id="blueTheme">Blue & White</button>
    <button id="redTheme">Red & Black</button>
  </div>
</header>

<main class="auth-main">
  <section class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-subtitle">Log in to see your family web and stay connected.</p>

    <form id="loginForm" class="auth-form">
      <label>
        <span>Email</span>
        <input id="email" type="email" required placeholder="you@example.com">
      </label>

      <label>
        <span>Password</span>
        <input id="password" type="password" required placeholder="••••••••">
      </label>

      <button type="submit" class="button-primary full-width">Login</button>
    </form>

    <p id="error" style="color: var(--primary); margin-top: 10px;"></p>

    <p class="auth-footer-text">
      Don’t have an account?
      <a href="signup.html">Sign up</a>
    </p>
  </section>
</main>

<script>
  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.textContent = "";

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    try {
      const res = await login(email, pass);

      // Save token
      localStorage.setItem("ofr_token", res.token);

      // Redirect to dashboard or nickname setup
      window.location.href = "dashboard.html";

    } catch (err) {
      errorBox.textContent = err.error || "Login failed.";
    }
  });
</script>

</body>
</html>
