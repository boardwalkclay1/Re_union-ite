<!DOCTYPE html>
<html lang="en" class="theme-blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up • Our Family Reunion</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/auth.css">
  <script defer src="js/theme.js"></script>
</head>
<body>

<header class="auth-header">
  <a href="index.html" class="logo">Our Family Reunion</a>
  <div class="theme-toggle">
    <button id="blueTheme">Blue & White</button>
    <button id="redTheme">Red & Black</button>
  </div>
</header>

<main class="auth-main">
  <section class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-subtitle">Start your family’s digital reunion space.</p>

    <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='nickname.html';">
      <label>
        <span>Email</span>
        <input type="email" required placeholder="you@example.com">
      </label>

      <label>
        <span>Password</span>
        <input type="password" required placeholder="Create a password">
      </label>

      <label>
        <span>Confirm password</span>
        <input type="password" required placeholder="Repeat your password">
      </label>

      <button type="submit" class="button-primary full-width">Create account</button>
    </form>

    <p class="auth-footer-text">
      Already have an account?
      <a href="login.html">Login</a>
    </p>
  </section>
</main>

</body>
</html>
