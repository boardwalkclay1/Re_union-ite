<!DOCTYPE html>
<html lang="en" class="theme-blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Nickname • Our Family Reunion</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
  <script defer src="js/theme.js"></script>
</head>
<body>

<header class="app-header">
  <div class="app-header-left">
    <span class="logo">Our Family Reunion</span>
  </div>
  <div class="app-header-right">
    <div class="theme-toggle">
      <button id="blueTheme">Blue & White</button>
      <button id="redTheme">Red & Black</button>
    </div>
  </div>
</header>

<main class="app-main centered">
  <section class="app-card wide">
    <h1>Let’s start with your nickname</h1>
    <p class="app-subtitle">
      This is how your family will see you in chats, the family web, and events.
    </p>

    <form class="app-form" onsubmit="event.preventDefault(); window.location.href='family-group.html';">
      <div class="form-grid">
        <label class="full-width">
          <span>Nickname <span class="required">*</span></span>
          <input type="text" required placeholder="Example: Tee, Mimi, Big Bro">
        </label>

        <label>
          <span>First name</span>
          <input type="text" placeholder="First name">
        </label>

        <label>
          <span>Last name</span>
          <input type="text" placeholder="Last name">
        </label>

        <label>
          <span>Phone (optional)</span>
          <input type="tel" placeholder="(555) 555-5555">
        </label>

        <label>
          <span>City</span>
          <input type="text" placeholder="City">
        </label>

        <label>
          <span>State</span>
          <input type="text" placeholder="State">
        </label>
      </div>

      <div class="form-actions">
        <button type="submit" class="button-primary">Save & Continue</button>
      </div>
    </form>
  </section>
</main>

</body>
</html>
