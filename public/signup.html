<!DOCTYPE html>
<html lang="en" class="theme-blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up • Our Family Reunion</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/auth.css">
  <script defer src="js/theme.js"></script>
  <script defer src="js/api.js"></script>
</head>

<body>

<header class="auth-header">
  <a href="index.html" class="logo">Our Family Reunion</a>
  <div class="theme-toggle">
    <button id="blueTheme">Blue & White</button>
    <button id="redTheme">Red & Black</button>
  </div>
</header>

<main class="auth-main">
  <section class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-subtitle">Start your family’s digital reunion space.</p>

    <form id="signupForm" class="auth-form">
      <label>
        <span>Email</span>
        <input id="email" type="email" required placeholder="you@example.com">
      </label>

      <label>
        <span>Password</span>
        <input id="password" type="password" required placeholder="Create a password">
      </label>

      <label>
        <span>Confirm password</span>
        <input id="confirm" type="password" required placeholder="Repeat your password">
      </label>

      <button type="submit" class="button-primary full-width">Create account</button>
    </form>

    <p id="error" style="color: var(--primary); margin-top: 10px;"></p>

    <p class="auth-footer-text">
      Already have an account?
      <a href="login.html">Login</a>
    </p>
  </section>
</main>

<script>
  const form = document.getElementById("signupForm");
  const errorBox = document.getElementById("error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.textContent = "";

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirm").value.trim();

    if (pass !== confirm) {
      errorBox.textContent = "Passwords do not match.";
      return;
    }

    try {
      const res = await api("/auth/signup", {
        method: "POST",
        body: JSON.stringify({ email, password: pass })
      });

      // Save token
      localStorage.setItem("ofr_token", res.token);

      // Move to nickname setup
      window.location.href = "nickname.html";

    } catch (err) {
      errorBox.textContent = err.error || "Signup failed.";
    }
  });
</script>

</body>
</html>
